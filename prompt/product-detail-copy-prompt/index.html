  <style>
:root {
  color-scheme: light;
  --bg: #f6f7fb;
  --panel: #ffffff;
  --panel-soft: #f8faff;
  --line: #e5e9f4;
  --text: #0f172a;
  --muted: #5f6b84;
  --accent: #4f46e5;
  --accent-2: #7c3aed;
  --accent-soft: rgba(79,70,229,0.08);
  --shadow: 0 20px 60px rgba(19, 31, 60, 0.08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(124,58,237,0.08), transparent 28%),
    radial-gradient(circle at top right, rgba(79,70,229,0.10), transparent 24%),

  color: var(--text);

}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.wrap { max-width: 1160px; margin: 0 auto; padding: 28px 18px 72px; }
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;

  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
}
.brand { display: flex; align-items: center; gap: 12px; color: var(--text); text-decoration: none; }
.brand:hover { text-decoration: none; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff; display: grid; place-items: center; font-weight: 800;
  box-shadow: 0 16px 32px rgba(79,70,229,0.22);
}
.brand-title { font-weight: 800; letter-spacing: -0.03em; font-size: 18px; }
.brand-sub { font-size: 13px; color: var(--muted); }
.nav { display: flex; gap: 10px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav a {
  white-space: nowrap;
  padding: 8px 12px; border: 1px solid transparent; border-radius: 12px; color: var(--muted);
}
.nav a:hover { text-decoration: none; border-color: var(--line); background: var(--panel-soft); color: var(--text); }
.hero {
  padding: 34px; border-radius: 28px; border: 1px solid var(--line);
  background: linear-gradient(135deg, rgba(79,70,229,0.96), rgba(124,58,237,0.92));
  color: #fff; box-shadow: var(--shadow); overflow: hidden; position: relative;
}
.hero::after {
  content: ""; position: absolute; width: 260px; height: 260px; border-radius: 999px;
  right: -70px; bottom: -90px; background: rgba(255,255,255,0.12);
}
.hero-grid { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.9fr); gap: 22px; position: relative; z-index: 1; }
.eyebrow { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.14); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.hero h1 { margin: 14px 0 12px; font-size: clamp(38px, 5vw, 58px); line-height: 1.02; letter-spacing: -0.05em; }
.hero p { margin: 0; font-size: 18px; max-width: 700px; color: rgba(255,255,255,0.92); }
.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 24px; }
.button {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 15px 22px; border-radius: 14px; font-weight: 800; text-decoration: none;

}
.button.primary { background: #fff; color: var(--accent); }
.button.secondary { background: rgba(255,255,255,0.14); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.stats { display: grid; gap: 12px; }
.stat-card {
  padding: 18px; border-radius: 18px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
}
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.85; }

.section {
  margin-top: 18px; padding: 24px; border: 1px solid var(--line); border-radius: 24px; background: var(--panel); box-shadow: var(--shadow);

.section-head { display: flex; justify-content: space-between; align-items: end; gap: 14px; margin-bottom: 16px; }
.section h2 { margin: 0; font-size: 28px; letter-spacing: -0.03em; }
.lead { margin: 8px 0 0; color: var(--muted); }
.grid { display: grid; gap: 16px; }
.grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
.grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.card {
  padding: 18px; border-radius: 20px; border: 1px solid var(--line); background: linear-gradient(180deg, var(--panel), #fafbff);
  box-shadow: 0 12px 30px rgba(19,31,60,0.04);
}
.card h3 { margin: 0 0 10px; font-size: 20px; letter-spacing: -0.03em; }
.kicker { display: inline-block; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 800; }
.muted { color: var(--muted); }
.list-clean { list-style: none; padding: 0; margin: 0; }
.list-clean li { padding: 12px 0; border-top: 1px solid var(--line); }
.list-clean li:first-child { border-top: none; padding-top: 0; }
.pill-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.pill {
  display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 12px; font-weight: 700;
}
.prompt-box {
  margin-top: 14px; padding: 16px; border-radius: 16px; border: 1px solid var(--line); background: #f9fbff; white-space: pre-wrap;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; line-height: 1.7;
}
.prompt-head {
  display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
}
.copy-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied {
  border-color: #059669;
  color: #059669;
  background: rgba(5,150,105,0.08);
}
.tool-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  background: #fff;
}
.tool-link:hover {
  text-decoration: none;
  border-color: var(--accent);
  color: var(--accent);
}
.mobile-copy-bar {
  display: none;
}
.var-grid {
  display: grid;
  gap: 12px;
}
.var-field {
  display: grid;
  gap: 8px;
}
.var-field-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
}
.var-field code {
  padding: 2px 6px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #f8faff;
  color: var(--accent);
  font-size: 12px;
}
.var-field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fff;
  padding: 12px;
  font-size: 14px;
  line-height: 1.5;
  resize: vertical;
  min-height: 88px;
  color: var(--text);
}
.var-field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
}
.metric-value {
  margin: 8px 0 0;
  font-size: 34px;
  line-height: 1;
  letter-spacing: -0.04em;
}
.mini-note {
  font-size: 13px;
  color: var(--muted);
}
.table-head,
.table-row {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) minmax(80px, 0.6fr) minmax(90px, 0.7fr);
  gap: 10px;
  align-items: center;
}
.table-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.table-row {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.table-row:last-child {
  border-bottom: none;
}
.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 13px;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.split { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 16px; }
.table-like { display: grid; gap: 12px; }
.row { padding: 14px 16px; border-radius: 16px; background: var(--panel-soft); border: 1px solid var(--line); }
.row-title { font-weight: 700; margin-bottom: 6px; }
.footer { margin-top: 26px; color: var(--muted); font-size: 14px; text-align: center; }
.breadcrumbs { display: flex; gap: 8px; flex-wrap: wrap; font-size: 14px; color: var(--muted); margin-bottom: 14px; }
.breadcrumbs a { color: var(--muted); }
@media (max-width: 960px) {
  .hero-grid, .split, .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .wrap { padding: 16px 12px 48px; }
  .topbar { padding: 12px 14px; }
  .section, .hero { padding: 18px; }
  .brand-sub, .nav { display: none; }
  .brand-mark { width: 34px; height: 34px; border-radius: 12px; }
  .brand-title { font-size: 17px; }
  .hero { padding: 22px; }
  .hero h1 { font-size: clamp(30px, 10vw, 40px); }
  .hero p { font-size: 15px; }
  .hero-actions { flex-direction: column; }
  .button { width: 100%; }
  .table-head,
  .table-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .table-head { display: none; }
  .table-row {
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 10px;
    background: #fff;
  }
  body.has-mobile-copy { padding-bottom: 96px; }
  .mobile-copy-bar {
    display: block;
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 10px;
    z-index: 60;
  }
  .mobile-copy-bar .copy-btn {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    border-color: transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-size: 15px;
  }
  .mobile-copy-bar .copy-btn.copied {
    background: linear-gradient(135deg, #059669, #10b981);
    color: #fff;
  }
}
</style>

<body class="" data-page-type="redirect_prompt" data-page-slug="product-detail-copy-prompt" data-counter-api="https://api.counterapi.dev/v1" data-counter-namespace="promptbutton-prod-v1">
  <div class="wrap">
    
    <header class="topbar">
      <a class="brand" href="/">

        <p class="muted">요청하신 페이지를 최신 관련 페이지로 연결해드립니다.</p>
        <div class="hero-actions" style="margin-top:12px;">
          <a class="button primary" href="/prompt/customer-support-reply-prompt">바로 이동</a>

  <script>window.location.replace("/prompt/customer-support-reply-prompt");</script>
  
<script>
(function () {
  function pushLocalEvent(payload) {
    try {
      var key = "pb_event_log";
      var prev = JSON.parse(localStorage.getItem(key) || "[]");
      prev.push(payload);
      localStorage.setItem(key, JSON.stringify(prev.slice(-200)));
    } catch (e) {
      /* ignore */
    }
  }

  function sanitizeToken(value, fallback) {
    var token = String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, "-")
      .replace(/^-+|-+$/g, "");
    if (!token) return fallback || "unknown";
    return token;
  }

  function formatDayKey(date) {
    var y = String(date.getFullYear());
    var m = String(date.getMonth() + 1).padStart(2, "0");
    var d = String(date.getDate()).padStart(2, "0");
    return y + m + d;
  }

  function hitSharedCounter(counterName) {
    var base = (document.body.dataset.counterApi || "").trim().replace(/[/]+$/, "");
    var namespace = (document.body.dataset.counterNamespace || "").trim();
    if (!base || !namespace || !window.fetch) return;

    var url =
      base +
      "/" +
      encodeURIComponent(namespace) +
      "/" +
      encodeURIComponent(counterName) +
      "/up";

    fetch(url, {
      method: "GET",
      mode: "cors",
      cache: "no-store",
      keepalive: true,
    }).catch(function () {
      /* ignore */
    });
  }

  function hitTrackedCounters(eventName, detail) {
    if (["page_view", "copy_click", "tool_outbound_click"].indexOf(eventName) === -1) {
      return;
    }

    var eventToken = sanitizeToken(eventName, "event");
    var slugToken = sanitizeToken(
      (detail && detail.slug) || document.body.dataset.pageSlug || "unknown",
      "unknown"
    );

    hitSharedCounter(eventToken + "--all");
    hitSharedCounter(eventToken + "--slug--" + slugToken);

    var dayKey = formatDayKey(new Date());
    hitSharedCounter("daily--" + dayKey + "--" + eventToken);

    if (eventName === "tool_outbound_click" && detail && detail.tool) {
      hitSharedCounter(
        eventToken + "--tool--" + sanitizeToken(detail.tool, "unknown")
      );
    }
  }

  window.pbTrack = function (name, props) {
    var detail = props || {};
    var payload = {
      event: name,
      props: detail,
      path: window.location.pathname,
      pageType: document.body.dataset.pageType || "unknown",
      pageSlug: document.body.dataset.pageSlug || "",
      ts: new Date().toISOString(),
    };

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push(Object.assign({ event: name }, detail));

    if (typeof window.gtag === "function") {
      window.gtag("event", name, Object.assign({ page_path: window.location.pathname }, detail));
    }

    if (typeof window.plausible === "function") {
      window.plausible(name, { props: detail });
    }

    pushLocalEvent(payload);

    if (window.PB_TRACK_ENDPOINT && navigator.sendBeacon) {
      try {
        var blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
        navigator.sendBeacon(window.PB_TRACK_ENDPOINT, blob);
      } catch (e) {
        /* ignore */
      }
    }

    hitTrackedCounters(name, detail);
  };

  function markCopied(button) {
    var original = button.dataset.originalLabel || button.textContent;
    button.dataset.originalLabel = original;
    button.textContent = "복사됨";
    button.classList.add("copied");
    setTimeout(function () {
      button.textContent = original;
      button.classList.remove("copied");
    }, 1300);
  }

  async function copyTextToClipboard(text) {
    if (!text) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return;
    }

    var fallback = document.createElement("textarea");
    fallback.value = text;
    fallback.setAttribute("readonly", "");
    fallback.style.position = "absolute";
    fallback.style.left = "-9999px";
    document.body.appendChild(fallback);
    fallback.select();
    document.execCommand("copy");
    fallback.remove();
  }

  function escapeRegExp(value) {
    return String(value || "").replace(new RegExp("[.*+?^${}()|[\]\\]", "g"), "\$&");
  }

  window.copyPrompt = async function (button) {
    if (!button) return;
    var targetId = button.getAttribute("data-copy-target");
    if (!targetId) return;
    var target = document.getElementById(targetId);
    if (!target) return;

    var text = (target.innerText || target.textContent || "").trim();
    if (!text) return;

    try {
      await copyTextToClipboard(text);
      markCopied(button);

      window.pbTrack("copy_click", {
        slug: button.dataset.slug || document.body.dataset.pageSlug || "",
        variant: button.dataset.copyVariant || "",
      });
    } catch (err) {
      window.pbTrack("copy_click_failed", {
        slug: button.dataset.slug || document.body.dataset.pageSlug || "",
        variant: button.dataset.copyVariant || "",
      });
    }
  };

  window.fillAndCopyPrompt = async function (button) {
    if (!button) return;

    var targetId = button.getAttribute("data-fill-target");
    if (!targetId) return;

    var target = document.getElementById(targetId);
    if (!target) return;

    var text = (target.innerText || target.textContent || "").trim();
    if (!text) return;

    var varKeys = String(button.getAttribute("data-var-keys") || "")
      .split(",")
      .map(function (item) { return item.trim(); })
      .filter(Boolean);

    var hasReplacement = false;

    varKeys.forEach(function (varKey) {
      var field = document.querySelector('[data-var-input="' + varKey + '"]');
      if (!field) return;

      var value = String(field.value || "").trim();
      if (!value) return;

      var regex = new RegExp("{{\s*" + escapeRegExp(varKey) + "\s*}}", "g");
      text = text.replace(regex, value);
      hasReplacement = true;
    });

    try {
      await copyTextToClipboard(text);
      markCopied(button);

      window.pbTrack("copy_click", {
        slug: button.dataset.slug || document.body.dataset.pageSlug || "",
        variant: button.dataset.copyVariant || "",
        filled: hasReplacement ? "yes" : "no",
      });
    } catch (err) {
      window.pbTrack("copy_click_failed", {
        slug: button.dataset.slug || document.body.dataset.pageSlug || "",
        variant: button.dataset.copyVariant || "",
        filled: hasReplacement ? "yes" : "no",
      });
    }
  };

  document.addEventListener("DOMContentLoaded", function () {
    var pageSlug = document.body.dataset.pageSlug || "unknown";
    var seenKey = "pb_page_view_seen__" + pageSlug;

    if (!sessionStorage.getItem(seenKey)) {
      window.pbTrack("page_view", {
        slug: pageSlug,
        page_type: document.body.dataset.pageType || "unknown",
      });
      sessionStorage.setItem(seenKey, "1");
    }

    document.querySelectorAll('a[data-track="tool-outbound"]').forEach(function (link) {
      link.addEventListener("click", function () {
        window.pbTrack("tool_outbound_click", {
          slug: link.dataset.slug || document.body.dataset.pageSlug || "",
          tool: link.dataset.tool || "",
        });
      });
    });
  });
})();
</script>
